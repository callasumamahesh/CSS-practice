<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
    }
    body{
        font-family: 'roboto';
    }
    h1{
        text-align: center;
        text-transform: uppercase;
    }
    p{
        color: red;
        margin: 10px 30px;
    }
    #idSelector{
        color: green;
    }
    .classSelector{
        color: blue;
    }
    ul{
        margin-left: 30px;
    }
    ul li{
        margin: 10px 0px;
        cursor: pointer;
    }
    ul li:nth-child(1){
        color: blueviolet;
    }
    ul li:nth-child(2){
        color: rosybrown;
    }  
    ul li:nth-child(3){
        color: gold;
    }
    ul li:hover{
        text-decoration: underline;

    }

</style>
<body>
    <h1>Selectors</h1>
    <p>This is a tag Selector</p>
    <p id="idSelector">This is a ID Selector</p>
    <p class="classSelector">This is a class Selector</p>
    <ul>
        <li>Text 1</li>
        <li>Text 2</li>
        <li>Text 3</li>
    </ul>
</body>
</html>
